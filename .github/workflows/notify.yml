name: MOPS Investor Conference Notifier

on:
  schedule:
    # 台灣時間早上 05:00 = UTC 時間前一天的 21:00
    - cron: '0 21 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行測試

permissions:
  contents: write # 允許 GitHub Actions 將更新後的 history.json 推送回儲存庫

jobs:
  run-notifier:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run MOPS Scraper
      env:
        # 從 GitHub Secrets 讀取 Discord Webhook 網址
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python main.py

    - name: Commit history.json if changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add history.json
        # 檢查是否有新的歷史紀錄，有的話就 commit 並 push，避免未來重複通知
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update history.json" && git push)
